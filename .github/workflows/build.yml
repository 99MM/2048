name: Build 2048

on:
  push:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Clean
        shell: bash
        run: rm -rf build dist

      - name: Build EXE
        run: pyinstaller --onefile --windowed --icon=icon.ico -y 2048.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: 2048-windows
          path: dist/*

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Clean
        run: rm -rf build dist

      - name: Build APP
        run: pyinstaller --onefile --windowed --noconsole --icon=icon.icns -y 2048.py

      - name: Upload APP
        uses: actions/upload-artifact@v4
        with:
          name: 2048-macos
          path: dist/*